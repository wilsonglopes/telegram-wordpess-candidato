<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conectar WhatsApp</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #1e293b; border-radius: 16px; padding: 40px; text-align: center; max-width: 420px; width: 95vw; }
    .logo { font-size: 2.5rem; margin-bottom: 16px; }
    h1 { font-size: 1.3rem; margin-bottom: 6px; }
    p  { color: #94a3b8; font-size: 0.9rem; margin-bottom: 24px; line-height: 1.5; }
    #qrWrap img { width: 260px; height: 260px; border-radius: 10px; border: 4px solid #3b82f6; }
    .status-ok { background: #14532d; color: #86efac; border-radius: 10px; padding: 20px; font-size: 1rem; }
    .status-ok .icon { font-size: 2rem; margin-bottom: 8px; }
    .spinner { border: 3px solid #334155; border-top-color: #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 0.8s linear infinite; margin: 20px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .instrucoes { text-align: left; background: #0f172a; border-radius: 10px; padding: 16px; margin-top: 20px; }
    .instrucoes h3 { font-size: 0.85rem; color: #94a3b8; margin-bottom: 10px; }
    .instrucoes ol { padding-left: 18px; font-size: 0.85rem; color: #cbd5e1; line-height: 2; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">📱</div>
  <h1 id="nomeCliente">Conectar WhatsApp</h1>
  <p id="subtitulo">Escaneie o QR code com o WhatsApp do número da campanha</p>

  <div id="conteudo">
    <div class="spinner"></div>
  </div>

  <div class="instrucoes" id="instrucoes" style="display:none">
    <h3>Como escanear:</h3>
    <ol>
      <li>Abra o WhatsApp no celular</li>
      <li>Toque em <strong>Aparelhos conectados</strong></li>
      <li>Toque em <strong>Conectar um aparelho</strong></li>
      <li>Aponte a câmera para o QR code acima</li>
    </ol>
  </div>
</div>

<script>
const token = location.pathname.split('/').pop();

async function verificar() {
  try {
    const r = await fetch(`/api/whatsapp/qr/${token}`);
    const data = await r.json();

    document.getElementById('nomeCliente').textContent = data.nome || 'Conectar WhatsApp';

    if (data.status === 'conectado') {
      document.getElementById('subtitulo').textContent = 'Número conectado com sucesso!';
      document.getElementById('instrucoes').style.display = 'none';
      document.getElementById('conteudo').innerHTML = `
        <div class="status-ok">
          <div class="icon">✅</div>
          <strong>WhatsApp conectado!</strong><br>
          <span style="font-size:0.85rem;color:#86efac">O sistema já pode enviar mensagens.</span>
        </div>`;
      return; // Para de verificar
    }

    if (data.qr) {
      document.getElementById('instrucoes').style.display = 'block';
      document.getElementById('conteudo').innerHTML = `<img src="${data.qr}" alt="QR Code WhatsApp">`;
    }

    // Verifica novamente em 5 segundos
    setTimeout(verificar, 5000);
  } catch {
    setTimeout(verificar, 8000);
  }
}

verificar();
</script>
</body>
</html>
